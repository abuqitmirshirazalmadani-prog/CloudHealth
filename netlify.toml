[build]
  command = "npm run build"
  publish = "dist/app/browser"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

[[redirects]]
  from = "/api/ai/guidance"
  to = "/.netlify/functions/ai-guidance"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
